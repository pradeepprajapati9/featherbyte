<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="1200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#0ea5a4"/>
    </linearGradient>
    <radialGradient id="glow" cx="600" cy="520" r="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <!-- cookie -->
  <g transform="translate(600,560)">
    <circle r="300" fill="#f4d9a6" stroke="rgba(123,75,39,0.25)" stroke-width="10"/>
    <g fill="#5b3a1e">
      <circle cx="-120" cy="-90" r="34"/>
      <circle cx="70" cy="-140" r="26"/>
      <circle cx="150" cy="-20" r="30"/>
      <circle cx="-40" cy="40" r="28"/>
      <circle cx="110" cy="120" r="32"/>
      <circle cx="-150" cy="110" r="24"/>
      <circle cx="10" cy="-30" r="20"/>
      <circle cx="-90" cy="180" r="18"/>
    </g>
  </g>

  <!-- consent check badge -->
  <g transform="translate(830,800)">
    <circle r="140" fill="#22c55e"/>
    <path d="M -60 5 L -15 55 L 70 -55" fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
